<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PotentialTravelHub Cloud</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    <h1>PotentialTravelHub Cloud</h1>
    <p>Travel & Study Abroad Inquiry Platform</p>

    <form id="inquiryForm">

      <input
        type="text"
        id="fullName"
        placeholder="Full Name"
        required
      >

      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      >

      <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
        required
      >
      <label for="document">Upload Document</label>

<input
  type="file"
  id="document"
  accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
>

      <select id="service" required>
        <option value="">Select Service</option>
        <option value="Study Abroad">Study Abroad</option>
        <option value="Visa Assistance">Visa Assistance</option>
        <option value="Travel Packages">Travel Packages</option>
        <option value="Corporate Travel">Corporate Travel</option>
      </select>

      <textarea
        id="message"
        placeholder="Tell us more about your inquiry"
        rows="5"
        required
      ></textarea>

            <button type="submit">Submit Inquiry</button>

      <div id="successMessage" class="success-message">
        ✅ Thank you for contacting Potential Travel Hub.
        We have received your inquiry and will contact you shortly.
      </div>

    </form>
  </div>

  <script src="script.js"></script>

</body>
</html>
